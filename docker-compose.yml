version: '3.8'

services:
  db:
    image: postgres:15
    container_name: myfinance-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: myfinance
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  api:
    build:
      context: ./backend
      dockerfile: MyFinance.API/Dockerfile
    container_name: myfinance-api
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=myfinance;Username=admin;Password=password
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: always

volumes:
  pgdata:
